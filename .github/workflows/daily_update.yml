name: Daily Intelligence Update

on:
  schedule:
    # Run every day at 08:30 AM Taiwan time (00:30 UTC)
    - cron: '30 0 * * *'
  workflow_dispatch:
    # Allows manual triggering from GitHub UI

permissions:
  contents: write

jobs:
  update-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install Node.js dependencies
        run: npm ci

      - name: Run daily update script
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          # Set git config so commit succeeds
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          # Run the update script (which crawls news, compiles the site, and pushes commits)
          python automate_update.py
